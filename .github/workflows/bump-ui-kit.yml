name: Bump UI kit on release

on:
  repository_dispatch:
    types: [ui-kit-released]

permissions:
  contents: write
  pull-requests: write

jobs:
  bump:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.29.3

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Update to released version
        run: |
          V="${{ github.event.client_payload.version }}"
          pnpm add -E snapflow-ui-kit@"$V"
          pnpm install --frozen-lockfile

      - name: Set git identity
        run: |
          git config --global user.name "chameleon-interface"
          git config --global user.email "chameleon-interface@users.noreply.github.com"

      - uses: peter-evans/create-pull-request@v6
        id: cpr
        with:
          token: ${{ secrets.BOT_TOKEN }}
          author: 'chameleon-interface <chameleon-interface@users.noreply.github.com>'
          committer: 'chameleon-interface <chameleon-interface@users.noreply.github.com>'
          commit-message: 'chore: bump snapflow-ui-kit to v${{ github.event.client_payload.version }}'
          title: 'chore: bump snapflow-ui-kit to v${{ github.event.client_payload.version }}'
          branch: 'chore/bump-ui-kit-${{ github.event.client_payload.version }}'
          delete-branch: true

      - name: Merge PR immediately
        if: steps.cpr.outputs.pull-request-number != ''
        env:
          GH_TOKEN: ${{ secrets.BOT_TOKEN }}
        run: |
          gh pr merge ${{ steps.cpr.outputs.pull-request-number }} \
            --repo "${GITHUB_REPOSITORY}" \
            --squash \
            --delete-branch \
            --admin
