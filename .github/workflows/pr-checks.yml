name: PR Checks

on:
  pull_request:
    branches: [development, main]

jobs:
  checks:
    name: Build and Lint Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.29.3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check code formatting
        run: pnpm format:check

      - name: Run ESLint
        run: pnpm lint

      - name: Run Stylelint
        run: pnpm stylelint

      - name: Validate i18n
        run: node scripts/run-i18n-validate.mjs

      - name: Build project
        run: pnpm build
